<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Opus RefBook Robot</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup">
    <h1>Opus RefBook Robot</h1>
    <p>Extension locale de contrôle visuel pour <strong>OPUS_REF_BOOK</strong>.</p>

    <section class="actions" aria-label="Actions">
      <a href="http://127.0.0.1/OPUS_REF_BOOK/" target="_blank" rel="noreferrer">Ouvrir 127.0.0.1</a>
      <a href="http://localhost/OPUS_REF_BOOK/" target="_blank" rel="noreferrer">Ouvrir localhost</a>
      <button id="copy-checklist" type="button">Copier checklist</button>
    </section>

    <p class="note">Sur une page RefBook locale, un badge <strong>Opus RefBook Robot</strong> apparaît en bas à droite.</p>
    <pre id="status">Prêt.</pre>
  </main>
  <script src="popup.js"></script>
</body>
</html>
